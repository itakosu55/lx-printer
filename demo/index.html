<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LX-D02 Printer Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6366f1;
        --primary-glow: rgba(99, 102, 241, 0.4);
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #22d3ee;
        --success: #10b981;
        --error: #ef4444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg);
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(99, 102, 241, 0.15) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 0%,
            rgba(34, 211, 238, 0.15) 0px,
            transparent 50%
          );
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 500px;
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      header {
        text-align: center;
        margin-bottom: 32px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 8px;
        background: linear-gradient(to right, #818cf8, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .status-badge .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 8px;
        background: var(--text-muted);
      }

      .status-badge.connected .dot {
        background: var(--success);
        box-shadow: 0 0 8px var(--success);
      }
      .status-badge.connecting .dot {
        background: var(--accent);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: rgba(0, 0, 0, 0.2);
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .stat-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 1.125rem;
        font-weight: 600;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      button {
        padding: 14px 24px;
        border-radius: 12px;
        border: none;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 14px 0 var(--primary-glow);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px 0 var(--primary-glow);
        filter: brightness(1.1);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }

      .console {
        margin-top: 32px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.75rem;
        height: 120px;
        overflow-y: auto;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .log-entry {
        margin-bottom: 4px;
        color: var(--text-muted);
      }

      .log-entry.info {
        color: var(--accent);
      }
      .log-entry.error {
        color: var(--error);
      }
      .log-entry.success {
        color: var(--success);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>LX-D02 Demo</h1>
        <div id="status-badge" class="status-badge">
          <span class="dot"></span>
          <span id="status-text">Disconnected</span>
        </div>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Battery</div>
          <div id="stat-battery" class="stat-value">-- %</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Voltage</div>
          <div id="stat-voltage" class="stat-value">---- mV</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Charging</div>
          <div id="stat-charging" class="stat-value">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">System Flags</div>
          <div
            id="stat-flags"
            class="stat-value"
            style="font-size: 0.7rem; color: var(--text-muted)"
          >
            No Data
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="btn-connect" class="btn-primary">Connect Printer</button>
        <div
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
          "
        >
          <button id="btn-print" class="btn-secondary" disabled>
            Test Pattern
          </button>
          <button id="btn-print-file" class="btn-secondary" disabled>
            Print PNG
          </button>
        </div>
        <input
          type="file"
          id="input-file"
          accept="image/png"
          style="display: none"
        />
        <button
          id="btn-clear-log"
          class="btn-secondary"
          style="font-size: 0.8rem; padding: 10px; margin-top: 8px"
        >
          Clear Logs
        </button>
      </div>

      <div id="console" class="console">
        <div class="log-entry">App initialized. Ready to connect.</div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
